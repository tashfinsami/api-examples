<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <style>
        body { font-family: Arial; margin: 20px; }

        .box {
            border: 1px solid #ccc;
            padding: 12px;
            margin: 10px 0;
        }

        input {
            margin: 5px;
            padding: 6px;
        }

        button {
            margin: 5px;
            padding: 6px 10px;
            cursor: pointer;
        }

        .section {
            margin-bottom: 25px;
        }
    </style>
</head>

<body>

<h2>My Dashboard</h2>

<div class="section">
    <h3>Profile</h3>
    <button onclick="loadMe()">Load Profile</button>
    <div id="meBox" class="box"></div>
</div>

<hr>

<div class="section">
    <h3>Update Profile</h3>

    <div class="box">
        <input id="up_name" placeholder="New Name"><br>
        <input id="up_email" placeholder="New Email"><br>
        <button onclick="updateMe()">Update</button>
    </div>
</div>

<hr>

<div class="section">
    <h3>Delete Account</h3>

    <div class="box">
        <p>Danger zone</p>
        <button onclick="deleteMe()" style="background:red;color:white;">
            Delete My Account
        </button>
    </div>
</div>

<hr>

<div class="section">
    <h3>All Users</h3>

    <input id="pageInput" type="number" placeholder="Page number (at least 1)">
    <button onclick="getAll()">Load Users</button>

    <div id="list"></div>
</div>

<hr>

<div class="section">
    <h3>Search by Email</h3>

    <input id="searchEmail" placeholder="Email">
    <button onclick="searchEmail()">Search</button>

    <div id="emailBox"></div>
</div>

<hr>

<button onclick="logout()" style="background:#111;color:#fff;">
    Logout
</button>

<script>

const API = "profile.php";

/* =====================
   GET TOKEN
===================== */
function getToken() {
    return localStorage.getItem("token");
}

/* =====================
   AUTH HEADER
===================== */
function authHeaders() {
    return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + getToken()
    };
}

/* =====================
   LOAD PROFILE
===================== */
function loadMe() {

    fetch(API + "/me", {
        method: "GET",
        headers: authHeaders()
    })
    .then(res => res.json())
    .then(data => {

        if (data.error) {
            document.getElementById("meBox").innerHTML = "<b>Not logged in</b>";
            return;
        }

        document.getElementById("meBox").innerHTML = `
            <b>ID:</b> ${data.id}<br>
            <b>Name:</b> ${data.name}<br>
            <b>Email:</b> ${data.email}
        `;
    });
}

/* =====================
   UPDATE PROFILE
===================== */
function updateMe() {

    let name = document.getElementById("up_name").value;
    let email = document.getElementById("up_email").value;

    fetch(API + "/me", {
        method: "PUT",
        headers: authHeaders(),
        body: JSON.stringify({ name, email })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || data.error);
        loadMe();
    });
}

/* =====================
   DELETE PROFILE
===================== */
function deleteMe() {

    if (!confirm("Are you sure?")) return;

    fetch(API + "/me", {
        method: "DELETE",
        headers: authHeaders()
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || data.error);
        logout();
    });
}

/* =====================
   ALL USERS
===================== */
function getAll() {

// get page from input
let page = document.getElementById("pageInput").value;
//set limit
let limit = 5;

// frontend check
if (!page || page < 1) {
    document.getElementById("list").innerHTML =
        "Page must be a valid number";
    return;
}

fetch(API + "/users?page=" + page + "&limit=" + limit, {
    method: "GET",
    headers: authHeaders()
})
.then(res => res.json())
.then(data => {

    if (data.error) {
        document.getElementById("list").innerHTML = data.error;
        return;
    }

    let html = "";

    data.forEach(user => {
        html += `
            <div class="box">
                <b>ID:</b> ${user.id}<br>
                <b>Name:</b> ${user.name}<br>
                <b>Email:</b> ${user.email}
            </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
});
}

/* =====================
   SEARCH EMAIL
===================== */
function searchEmail() {

    let email = document.getElementById("searchEmail").value;

    fetch(API + "/users?email=" + encodeURIComponent(email), {
        method: "GET",
        headers: authHeaders()
    })
    .then(res => res.json())
    .then(data => {

        if (data.error) {
            document.getElementById("emailBox").innerHTML = "<b>User not found</b>";
            return;
        }

        document.getElementById("emailBox").innerHTML = `
            <div class="box">
                <b>ID:</b> ${data.id}<br>
                <b>Name:</b> ${data.name}<br>
                <b>Email:</b> ${data.email}
            </div>
        `;
    });
}

/* =====================
   LOGOUT (JWT STYLE)
===================== */
function logout() {
    localStorage.removeItem("token");
    window.location.href = "index.html";
}

/* =====================
   AUTO CHECK LOGIN
===================== */
window.onload = function () {

    if (!getToken()) {
        window.location.href = "index.html";
        return;
    }

    loadMe();
};

</script>

</body>
</html>
