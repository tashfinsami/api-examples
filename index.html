<script>

const API = "profile.php";

window.onload = function () {

    fetch(API+ "/me", {
        credentials: "include"
    })
    .then(res => res.json())
    .then(data => {

        if (data.error) {
            window.location.href = "auth.html";
        } else {
            window.location.href = "profile.html";
        }
    });

};
</script>
